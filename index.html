const COSTYCNC_DEFAULT_DIAMETER_MM = 120;
function costycnc_getScaleFactor() {
var diameter = parseFloat(document.getElementById("costycnc_diameter").value);
if (isNaN(diameter) || diameter <= 0) diameter = COSTYCNC_DEFAULT_DIAMETER_MM;
var circumference_real = diameter * Math.PI;
var circumference_standard = COSTYCNC_DEFAULT_DIAMETER_MM * Math.PI;
var factor = circumference_standard / circumference_real;
return factor;
} 
 
 
async function pasteSvgFromClipboard() {
    try {
        const clipboardItems = await navigator.clipboard.read();
        for (const item of clipboardItems) {
            if (item.types.includes("image/svg+xml")) {
                const blob = await item.getType("image/svg+xml");
                const svgText = await blob.text();
                const dataUrl = "data:image/svg+xml;base64," + btoa(svgText);
                // Passa il Data URL a myFunction
                myFunction(dataUrl);
                return; // esce dopo il primo SVG trovato
            }
        }
        alert("Nessun SVG trovato nella clipboard.");
    } catch (err) {
        console.error("Errore durante lettura clipboard:", err);
        alert("Errore: assicurati di aver copiato un SVG e che il sito sia HTTPS.");
    }
}
document.getElementById("pasteBtn").addEventListener("click", pasteSvgFromClipboard);
</script>

	color:black;
  `;
  // Add the error message to the dialog
  var messageElement = document.createElement('p');
  var messageTextNode = document.createTextNode(message);
messageElement.appendChild(messageTextNode);
 dialog.appendChild(messageElement);
  // Add a close button to the dialog
  var closeButton = document.createElement('button');
  closeButton.textContent = "OK";
  closeButton.onclick = function() {
    document.body.removeChild(dialog);

      function retrieveImageFromClipboardAsBlob(pasteEvent, callback) {
        if (pasteEvent.clipboardData == false) {
          if (typeof(callback) == "function") {
            callback(undefined);
          }
        };
        var items = pasteEvent.clipboardData.items;
        if (items == undefined) {
          if (typeof(callback) == "function") {
            callback(undefined);
          }
        };
        for (var i = 0; i < items.length; i++) {
          console.log("type=" + items[i].type);
          // Skip content if not image
          if (items[i].type.indexOf("image") == -1) continue;
          // Retrieve image on clipboard as blob
          var blob = items[i].getAsFile();
          if (typeof(callback) == "function") {
            callback(blob);
          }
        }
      }

      for (i=om-1; i>=0; i--) {
        if (pt[j]==j-1) {
          ocurve.tag[i]     = curve.tag[mod(j,m)];
          ocurve.c[i * 3 + 0]    = curve.c[mod(j,m) * 3 + 0];
          ocurve.c[i * 3 + 1]    = curve.c[mod(j,m) * 3 + 1];

          ocurve.alpha0[i]  = curve.alpha0[mod(j,m)];
          ocurve.beta[i]    = curve.beta[mod(j,m)];
          s[i] = t[i] = 1.0;
        } else {

          ocurve.c[i * 3 + 0] = opt[j].c[0];

                                       vert[mod(j,m)]);
          ocurve.alpha[i] = opt[j].alpha;
          ocurve.alpha0[i] = opt[j].alpha;
          s[i] = opt[j].s;
          t[i] = opt[j].t;
        }
        j = pt[j];
      }
      for (i=0; i<om; i++) {
        i1 = mod(i+1,om);
        ocurve.beta[i] = s[i] / (s[i] + t[i1]);
      }

            (curve.c[i * 3 + 1].y * sizey).toFixed(3) + ',';
        b += (curve.c[i * 3 + 2].x * sizex).toFixed(3) + ' ' +
            (curve.c[i * 3 + 2].y * sizey).toFixed(3) + ' ';
        return b;
      }
      function segment(i) {
        var s = 'L ' + (curve.c[i * 3 + 1].x * sizex).toFixed(3) + ' ' +
            (curve.c[i * 3 + 1].y * sizey).toFixed(3) + ' ';
        s += (curve.c[i * 3 + 2].x * sizex).toFixed(3) + ' ' +
            (curve.c[i * 3 + 2].y * sizey).toFixed(3) + ' ';
        return s;
      }
      var n = curve.n, i;
      var p = 'M' + (curve.c[(n - 1) * 3 + 2].x * sizex).toFixed(3) +
          ' ' + (curve.c[(n - 1) * 3 + 2].y * sizey).toFixed(3) + ' ';
      for (i = 0; i < n; i++) {
        if (curve.tag[i] === "CURVE") {
          p += bezier(i);
        } else if (curve.tag[i] === "CORNER") {
          p += segment(i);
        }
      }
